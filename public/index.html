<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短宣募資</title>
  <style>
    :root {
      --bg: #f6efe6;
      --bg-glow: #ead7c2;
      --surface: #fffaf4;
      --surface-alt: #f3e7da;
      --ink: #231c18;
      --muted: #6e6258;
      --brand: #9f4e38;
      --brand-deep: #733220;
      --line: #d9c4b0;
      --line-soft: #eadccf;
      --shadow: 0 14px 38px rgba(72, 45, 31, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top, var(--bg-glow), transparent 38%),
        linear-gradient(180deg, #fbf6f0 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 24px; font-weight: 700; color: var(--brand-deep); margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; color: var(--brand); margin-bottom: 12px; }

    /* table */
    .table-wrap { overflow-x: auto; margin-bottom: 20px; border-radius: 14px; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 14px; }
    th { background: var(--brand); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--line-soft); }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: var(--surface-alt); }
    .sold-out { color: var(--muted); }

    /* sold-out badge */
    .badge-done {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: #d4edda;
      color: #1a6930;
      border: 1px solid #a8d5b5;
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 6px;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* progress bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 120px;
    }
    .progress-label {
      white-space: nowrap;
      font-size: 13px;
      color: var(--ink);
    }
    .progress-bar-track {
      flex: 1;
      height: 6px;
      background: var(--line-soft);
      border-radius: 99px;
      overflow: hidden;
      min-width: 48px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 99px;
      transition: width .3s ease;
    }
    .progress-bar-fill.full {
      background: #2e7d4f;
    }

    /* divider */
    hr { border: none; border-top: 1px dashed var(--line); margin: 20px 0; }

    /* form */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 600; color: var(--brand); margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-size: 15px;
      background: rgba(255, 250, 244, 0.92);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(159, 78, 56, 0.12);
    }
    .hint { font-size: 13px; color: var(--muted); margin-top: 5px; }
    .hint.bank {
      background: #f1e2d5;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      color: var(--brand-deep);
      font-weight: 500;
    }

    /* item info card */
    .item-info-card {
      display: flex;
      gap: 12px;
      background: var(--surface-alt);
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 8px;
    }
    .item-info-card .info-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .item-info-card .info-stat .info-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .item-info-card .info-stat .info-val {
      font-size: 16px;
      font-weight: 700;
      color: var(--brand-deep);
    }
    .item-info-card .info-divider {
      width: 1px;
      background: var(--line);
      margin: 0 4px;
    }

    /* button */
    button {
      width: 100%;
      padding: 12px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .15s;
      margin-top: 4px;
    }
    button:hover { background: var(--brand-deep); transform: translateY(-1px); }
    button:disabled { background: #bfa391; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: var(--brand);
      border: 2px solid var(--brand);
      margin-top: 12px;
    }
    .btn-secondary:hover {
      background: var(--brand);
      color: #fff;
    }

    /* alerts */
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .alert-error { background: #fde8e8; color: #8b1a1a; border: 1px solid #f5c0c0; }
    .alert-warning { background: #fff8e1; color: #7a5c00; border: 1px solid #ffe082; }

    /* receipt */
    .receipt { border: 2px dashed var(--brand); background: var(--surface); padding: 16px 18px; border-radius: 12px; box-shadow: var(--shadow); margin-top: 16px; }
    .receipt h3 { font-size: 18px; color: var(--brand-deep); margin-bottom: 12px; }
    .receipt-row { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px dashed rgba(115, 50, 32, 0.18); font-size: 15px; }
    .receipt-row:last-child { border-bottom: none; padding-bottom: 0; }
    .receipt-row .lbl { color: var(--brand); font-weight: 600; }

    /* loading spinner */
    .loading {
      text-align: center;
      color: var(--brand);
      padding: 28px 20px;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--line-soft);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>短宣募資</h1>
  <div id="app">
    <div class="loading"><div class="spinner"></div>載入中...</div>
  </div>
</div>

<script>
let items = [];
let receipt = null;

async function loadItems() {
  const res = await fetch('/api/items');
  if (!res.ok) throw new Error('無法載入項目');
  return res.json();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const app = document.getElementById('app');
  const available = items.filter(it => it['剩餘數量'] > 0);

  let html = '';

  if (items.length > 0) {
    html += `<h2>認獻項目一覽</h2><div class="table-wrap"><table>
      <thead><tr><th>名稱</th><th>短宣隊</th><th>單價</th><th>所需</th><th>進度</th></tr></thead><tbody>`;
    for (const it of items) {
      const sold = it['剩餘數量'] === 0;
      const pct = it['所需數量'] > 0 ? Math.round(it['已募集'] / it['所需數量'] * 100) : 0;
      const clampedPct = Math.min(pct, 100);
      const badgeHtml = sold ? '<span class="badge-done">已完成 ✓</span>' : '';
      html += `<tr class="${sold ? 'sold-out' : ''}">
        <td>${escHtml(it['名稱'])}${badgeHtml}</td>
        <td>${escHtml(it['短宣隊'])}</td>
        <td>$${it['單價']}</td>
        <td>${it['所需數量']}</td>
        <td>
          <div class="progress-wrap">
            <span class="progress-label">${it['已募集']}/${it['所需數量']}</span>
            <div class="progress-bar-track">
              <div class="progress-bar-fill${clampedPct >= 100 ? ' full' : ''}" style="width:${clampedPct}%"></div>
            </div>
          </div>
        </td>
      </tr>`;
    }
    html += '</tbody></table></div><hr>';
  }

  if (receipt) {
    html += `<div class="receipt">
      <h3>成功送出</h3>
      <div class="receipt-row"><span class="lbl">姓名</span><span>${escHtml(receipt['姓名'])}</span></div>
      <div class="receipt-row"><span class="lbl">物資</span><span>${escHtml(receipt['物資'])}（${escHtml(receipt['短宣隊'])}）</span></div>
      <div class="receipt-row"><span class="lbl">數量</span><span>${receipt['數量']}</span></div>
      <div class="receipt-row"><span class="lbl">奉獻方式</span><span>${escHtml(receipt['奉獻方式'])}</span></div>
      <div class="receipt-row"><span class="lbl">總金額</span><span>$${receipt['總金額']}</span></div>
    </div>
    <button class="btn-secondary" onclick="receipt = null; render()">重新認獻</button>`;
    app.innerHTML = html;
    return;
  }

  if (available.length === 0) {
    html += `<div class="alert alert-warning">目前沒有可選的認獻項目</div>`;
    app.innerHTML = html;
    return;
  }

  html += `<div id="error-msg"></div>
  <div class="form-group">
    <label for="name">姓名</label>
    <input type="text" id="name" placeholder="請輸入姓名">
  </div>
  <div class="form-group">
    <label for="item-select">物資</label>
    <select id="item-select">`;
  for (const it of available) {
    html += `<option value="${it['id']}">${escHtml(it['名稱'])}（${escHtml(it['短宣隊'])}）</option>`;
  }
  html += `</select>
  </div>
  <div id="item-info"></div>
  <hr>
  <div class="form-group">
    <label for="payment">奉獻方式</label>
    <select id="payment">
      <option value="現金">現金</option>
      <option value="銀行轉帳">銀行轉帳</option>
    </select>
  </div>
  <div id="bank-hint" class="hint bank" style="display:none">請轉至：國泰世華 (013) 127506314089</div>
  <div class="form-group">
    <label for="qty">數量</label>
    <input type="number" id="qty" min="1" value="1">
  </div>
  <div id="total-hint" class="hint"></div>
  <button id="submit-btn" onclick="submitDonation()">送出</button>`;

  app.innerHTML = html;
  updateItemInfo();
  document.getElementById('item-select').addEventListener('change', updateItemInfo);
  document.getElementById('qty').addEventListener('input', updateTotal);
  document.getElementById('payment').addEventListener('change', () => {
    const bankHint = document.getElementById('bank-hint');
    if (bankHint) bankHint.style.display = document.getElementById('payment').value === '銀行轉帳' ? 'block' : 'none';
  });
}

function getSelectedItem() {
  const sel = document.getElementById('item-select');
  if (!sel) return null;
  const id = Number(sel.value);
  return items.find(it => it['id'] === id);
}

function updateItemInfo() {
  const it = getSelectedItem();
  const info = document.getElementById('item-info');
  const qty = document.getElementById('qty');
  if (!it || !info || !qty) return;
  info.innerHTML = `<div class="item-info-card">
    <div class="info-stat">
      <span class="info-lbl">單價</span>
      <span class="info-val">$${it['單價']}</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-stat">
      <span class="info-lbl">剩餘數量</span>
      <span class="info-val">${it['剩餘數量']} 份</span>
    </div>
  </div>`;
  qty.max = it['剩餘數量'];
  updateTotal();
}

function updateTotal() {
  const it = getSelectedItem();
  const qtyEl = document.getElementById('qty');
  const hint = document.getElementById('total-hint');
  if (!it || !qtyEl || !hint) return;
  const qty = parseInt(qtyEl.value) || 0;
  hint.textContent = `總金額：$${it['單價'] * qty}`;
}

async function submitDonation() {
  const nameEl = document.getElementById('name');
  const qtyEl = document.getElementById('qty');
  const paymentEl = document.getElementById('payment');
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');

  errEl.innerHTML = '';
  const it = getSelectedItem();
  if (!it) { showError('錯誤，請選擇物資'); return; }

  const name = nameEl.value.trim();
  const qty = parseInt(qtyEl.value);
  const payment = paymentEl.value;

  if (!name) { showError('錯誤，請輸入姓名'); return; }
  if (!qty || qty <= 0 || qty > it['剩餘數量']) { showError('錯誤，請檢查數量'); return; }

  btn.disabled = true;
  btn.textContent = '送出中...';
  try {
    const res = await fetch('/api/donate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 姓名: name, 物資: it['名稱'], 短宣隊: it['短宣隊'], 數量: qty, 奉獻方式: payment }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) { showError(data.error || '送出失敗，請再試一次'); return; }
    receipt = data.receipt;
    render();
    try { items = await loadItems(); } catch (_) {}
  } catch (e) {
    showError('網路錯誤，請再試一次');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '送出'; }
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  if (el) el.innerHTML = `<div class="alert alert-error">${escHtml(msg)}</div>`;
}

(async () => {
  try {
    items = await loadItems();
    render();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="alert alert-error">載入失敗：${escHtml(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
