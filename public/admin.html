<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短宣認獻管理</title>
  <style>
    :root {
      --bg: #f6efe6;
      --bg-glow: #ead7c2;
      --surface: #fffaf4;
      --surface-alt: #f3e7da;
      --ink: #231c18;
      --muted: #6e6258;
      --brand: #9f4e38;
      --brand-deep: #733220;
      --line: #d9c4b0;
      --line-soft: #eadccf;
      --shadow: 0 14px 38px rgba(72, 45, 31, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top, var(--bg-glow), transparent 38%),
        linear-gradient(180deg, #fbf6f0 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }

    /* header row */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    h1 { font-size: 22px; font-weight: 700; color: var(--brand-deep); }
    h2 { font-size: 16px; font-weight: 600; color: var(--brand); margin: 20px 0 10px; }

    /* refresh button */
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      transition: background .12s, border-color .12s, transform .12s;
      white-space: nowrap;
    }
    .btn-refresh:hover {
      background: var(--surface-alt);
      border-color: var(--brand);
      transform: translateY(-1px);
    }
    .btn-refresh:active { transform: none; }

    /* stats cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .stat-card .stat-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .stat-card .stat-val {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-deep);
      line-height: 1;
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: span 2; }
    }

    /* tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 0; border-bottom: 2px solid var(--line); }
    .tab { padding: 9px 18px; cursor: pointer; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 600; color: var(--brand); background: transparent; border: none; transition: background .12s, color .12s; }
    .tab.active { background: var(--brand); color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      background: var(--surface);
      border: 1px solid var(--line-soft);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 20px 16px 24px;
      box-shadow: 0 4px 16px rgba(72, 45, 31, 0.06);
    }

    /* table */
    .table-wrap { overflow-x: auto; border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 14px; }
    th { background: var(--brand); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--line-soft); }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: var(--surface-alt); }

    /* records table: smaller font on mobile */
    #rec-list td,
    #ov-records td { font-size: 13px; }

    /* inline action buttons */
    .btn-sm { padding: 5px 10px; font-size: 12px; white-space: nowrap; }
    tr.editing > td { background: rgba(159, 78, 56, 0.08) !important; }
    .edit-target-label { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .edit-target-label strong { color: var(--brand-deep); }

    /* form */
    hr { border: none; border-top: 1px dashed var(--line); margin: 20px 0; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--brand); margin-bottom: 5px; }
    input[type=text], input[type=number], select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255, 250, 244, 0.92);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(159, 78, 56, 0.12);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* buttons */
    .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .12s, transform .12s; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .btn-primary:disabled { background: #bfa391; cursor: not-allowed; transform: none; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #922b21; }
    .btn-danger:disabled { background: #e0a0a0; cursor: not-allowed; }

    /* alerts */
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin: 10px 0; }
    .alert-success { background: #f1e2d5; color: var(--brand-deep); border: 1px solid #dab9a3; }
    .alert-error { background: #fde8e8; color: #8b1a1a; border: 1px solid #f5c0c0; }
    .alert-info { background: #f4ede6; color: #5c4d40; border: 1px solid #ddc9b7; }
    .loading { text-align: center; color: var(--brand); padding: 20px; }

    /* spinner modal */
    .spinner-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:999; align-items:center; justify-content:center; }
    .spinner-overlay.active { display:flex; }
    .spinner-box { background:#fff; border-radius:16px; padding:28px 36px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,.18); }
    .spinner-ring { width:36px; height:36px; border:4px solid #e8d5c8; border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner-label { font-size:14px; color:var(--brand-deep); font-weight:600; }
    /* reset modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:#fff; border-radius:16px; padding:28px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,.25); }
    .modal-box h3 { color:#8b1a1a; margin:0 0 8px; font-size:18px; }
    .modal-box p { font-size:13px; color:#555; margin:0 0 16px; line-height:1.6; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }

  </style>
</head>
<body>

<div class="container" id="main">
  <div class="header-row">
    <h1>短宣認獻管理</h1>
    <button class="btn-refresh" onclick="refresh()">&#x1F504; 重新整理</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">總覽</button>
    <button class="tab" onclick="switchTab('manage')">物資項目</button>
    <button class="tab" onclick="switchTab('records')">認獻紀錄</button>
  </div>

  <!-- 總覽 -->
  <div id="tab-overview" class="tab-panel active">
    <div id="ov-stats" class="stats-row">
      <div class="stat-card"><div class="stat-lbl">物資種類</div><div class="stat-val" id="stat-items">—</div></div>
      <div class="stat-card"><div class="stat-lbl">認獻筆數</div><div class="stat-val" id="stat-records">—</div></div>
      <div class="stat-card"><div class="stat-lbl">已募集總額</div><div class="stat-val" id="stat-total">—</div></div>
    </div>
    <h2>認獻項目</h2>
    <div id="ov-items"><div class="loading">載入中...</div></div>
    <h2>認獻紀錄</h2>
    <div id="ov-records"><div class="loading">載入中...</div></div>
  </div>

  <!-- 管理項目 -->
  <div id="tab-manage" class="tab-panel">
    <h2>項目清單</h2>
    <div id="del-msg"></div>
    <div id="mg-items"><div class="loading">載入中...</div></div>

    <div id="item-edit-section" style="display:none">
      <hr>
      <h2>編輯項目</h2>
      <div id="item-edit-msg"></div>
      <div id="item-edit-target-label" class="edit-target-label"></div>
      <div class="row2">
        <div class="form-group"><label>物資名稱</label><input type="text" id="edit-item-name"></div>
        <div class="form-group"><label>短宣隊</label><input type="text" id="edit-item-team"></div>
      </div>
      <div class="row2">
        <div class="form-group"><label>單價</label><input type="number" id="edit-item-price" min="1"></div>
        <div class="form-group"><label>所需數量</label><input type="number" id="edit-item-required" min="1"><div id="edit-item-required-hint" class="hint"></div></div>
      </div>
      <button class="btn btn-primary" id="save-item-btn" onclick="saveItem()">儲存變更</button>
    </div>

    <hr>
    <h2>新增項目</h2>
    <div id="add-msg"></div>
    <div class="row2">
      <div class="form-group"><label>物資名稱</label><input type="text" id="add-name" placeholder="例如：孩子禮物"></div>
      <div class="form-group"><label>短宣隊</label><input type="text" id="add-team" placeholder="例如：肯亞短宣"></div>
    </div>
    <div class="row2">
      <div class="form-group"><label>單價</label><input type="number" id="add-price" min="1" placeholder="0"></div>
      <div class="form-group"><label>所需數量</label><input type="number" id="add-required" min="1" value="1"></div>
    </div>
    <button class="btn btn-primary" id="add-btn" onclick="addItem()">新增</button>
  </div>

  <!-- 管理認獻 -->
  <div id="tab-records" class="tab-panel">
    <h2>認獻紀錄</h2>
    <div id="rec-list"><div class="loading">載入中...</div></div>

    <div id="rec-edit-section" style="display:none">
      <hr>
      <h2>編輯認獻紀錄</h2>
      <div id="edit-msg"></div>
      <div id="edit-target-label" class="edit-target-label"></div>
      <div class="row2">
        <div class="form-group"><label>姓名</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>物資（短宣隊）</label><select id="edit-item"></select></div>
      </div>
      <div class="row2">
        <div class="form-group"><label>數量</label><input type="number" id="edit-qty" min="1"><div id="edit-qty-hint" class="hint"></div></div>
        <div class="form-group"><label>奉獻方式</label>
          <select id="edit-payment">
            <option value="現金">現金</option>
            <option value="銀行轉帳">銀行轉帳</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" id="save-btn" onclick="saveRecord()">儲存變更</button>
        <button class="btn btn-danger" id="del-rec-btn" onclick="deleteRecord()">刪除這筆紀錄</button>
      </div>
    </div>

    </div>
  </div>
</div>

<div class="container" style="margin-top:16px;padding-top:20px;border-top:2px dashed #f5c0c0">
  <h2 style="color:#8b1a1a">清除所有資料</h2>
  <p style="font-size:13px;color:#666;margin:4px 0 12px">清除所有認獻紀錄與認獻項目。</p>
  <button class="btn btn-danger" onclick="openResetModal()">清除所有資料</button>
</div>

<div class="spinner-overlay" id="spinner-overlay">
  <div class="spinner-box">
    <div class="spinner-ring"></div>
    <div class="spinner-label">處理中...</div>
  </div>
</div>

<div class="modal-overlay" id="reset-modal">
  <div class="modal-box">
    <h3>清除所有資料</h3>
    <p>此操作將刪除所有認獻紀錄與認獻項目。<br><strong>此操作無法復原。</strong></p>
    <div id="reset-countdown" style="font-size:13px;color:#999;margin-bottom:16px"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeResetModal()" style="background:#eee;color:#333">取消</button>
      <button class="btn btn-danger" id="reset-confirm-btn" onclick="executeReset()" disabled>確認清除</button>
    </div>
  </div>
</div>

<script>
let items = [], records = [], currentEditId = null, currentEditItemId = null;

function showSpinner() { document.getElementById('spinner-overlay').classList.add('active'); }
function hideSpinner() { document.getElementById('spinner-overlay').classList.remove('active'); }

async function apiFetch(url, method, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const isWrite = method && method !== 'GET';
  if (isWrite) showSpinner();
  try {
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '操作失敗');
    return data;
  } finally {
    if (isWrite) hideSpinner();
  }
}

// ── tabs ──────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['overview','manage','records'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');

  // clear edit state on tab switch
  currentEditId = null;
  currentEditItemId = null;
  document.getElementById('rec-edit-section').style.display = 'none';
  document.getElementById('item-edit-section').style.display = 'none';
  document.querySelectorAll('tr.editing').forEach(r => r.classList.remove('editing'));
}

// ── render ────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function itemsTable(rows) {
  if (!rows.length) return '<div class="alert alert-info">目前沒有認獻項目</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>名稱</th><th>短宣隊</th><th>單價</th><th>所需</th><th>已募集</th><th>剩餘</th></tr></thead>
    <tbody>${rows.map(it => `<tr><td>${escHtml(it['名稱'])}</td><td>${escHtml(it['短宣隊'])}</td>
      <td>$${it['單價']}</td><td>${it['所需數量']}</td><td>${it['已募集']}</td><td>${it['剩餘數量']}</td></tr>`).join('')}
    </tbody></table></div>`;
}

function itemsTableWithDelete(rows) {
  if (!rows.length) return '<div class="alert alert-info">目前沒有認獻項目</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>名稱</th><th>短宣隊</th><th>單價</th><th>所需</th><th>已募集</th><th>剩餘</th><th></th></tr></thead>
    <tbody>${rows.map(it => `<tr id="item-row-${it['id']}"><td>${escHtml(it['名稱'])}</td><td>${escHtml(it['短宣隊'])}</td>
      <td>$${it['單價']}</td><td>${it['所需數量']}</td><td>${it['已募集']}</td><td>${it['剩餘數量']}</td>
      <td><div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="startEditItem(${it['id']})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItemById(${it['id']})">刪除</button>
      </div></td></tr>`).join('')}
    </tbody></table></div>`;
}

function recordsTable(rows) {
  if (!rows.length) return '<div class="alert alert-info">目前沒有認獻紀錄</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>姓名</th><th>物資</th><th>短宣隊</th><th>數量</th><th>總金額</th><th>奉獻方式</th></tr></thead>
    <tbody>${rows.map((r, i) => `<tr><td>${i+1}</td><td>${escHtml(r['姓名'])}</td><td>${escHtml(r['物資'])}</td>
      <td>${escHtml(r['短宣隊'])}</td><td>${r['數量']}</td><td>$${r['總金額']}</td><td>${escHtml(r['奉獻方式'])}</td></tr>`).join('')}
    </tbody></table></div>`;
}

function recordsTableWithEdit(rows) {
  if (!rows.length) return '<div class="alert alert-info">目前沒有認獻紀錄</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>姓名</th><th>物資</th><th>短宣隊</th><th>數量</th><th>總金額</th><th>奉獻方式</th><th></th></tr></thead>
    <tbody>${rows.map((r, i) => `<tr id="rec-row-${r['id']}"><td>${i+1}</td><td>${escHtml(r['姓名'])}</td><td>${escHtml(r['物資'])}</td>
      <td>${escHtml(r['短宣隊'])}</td><td>${r['數量']}</td><td>$${r['總金額']}</td><td>${escHtml(r['奉獻方式'])}</td>
      <td><div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="startEditRecord(${r['id']})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecordById(${r['id']})">刪除</button>
      </div></td></tr>`).join('')}
    </tbody></table></div>`;
}

function renderAll() {
  // 統計數字
  const totalAmount = records.reduce((sum, r) => sum + (Number(r['總金額']) || 0), 0);
  document.getElementById('stat-items').textContent = items.length;
  document.getElementById('stat-records').textContent = records.length;
  document.getElementById('stat-total').textContent = '$' + totalAmount.toLocaleString();

  // 總覽
  document.getElementById('ov-items').innerHTML = itemsTable(items);
  document.getElementById('ov-records').innerHTML = recordsTable(records);

  // 管理項目
  document.getElementById('mg-items').innerHTML = itemsTableWithDelete(items);
  if (currentEditItemId !== null) {
    if (!items.find(it => it['id'] === currentEditItemId)) {
      currentEditItemId = null;
      document.getElementById('item-edit-section').style.display = 'none';
    } else {
      const row = document.getElementById(`item-row-${currentEditItemId}`);
      if (row) row.classList.add('editing');
    }
  }

  // 管理認獻
  document.getElementById('rec-list').innerHTML = recordsTableWithEdit(records);
  buildEditItemSelect();
  if (currentEditId !== null) {
    if (!records.find(r => r['id'] === currentEditId)) {
      // 正在編輯的記錄已消失，收起表單
      currentEditId = null;
      document.getElementById('rec-edit-section').style.display = 'none';
      document.getElementById('edit-msg').innerHTML =
        '<div class="alert alert-error">此筆紀錄已被刪除，無法繼續編輯。</div>';
      document.getElementById('rec-edit-section').style.display = 'block';
    } else {
      const row = document.getElementById(`rec-row-${currentEditId}`);
      if (row) row.classList.add('editing');
    }
  }
}

function buildEditItemSelect() {
  const sel = document.getElementById('edit-item');
  sel.innerHTML = items.map(it =>
    `<option value="${it['id']}">${escHtml(it['名稱'])}（${escHtml(it['短宣隊'])}）</option>`
  ).join('');
}

function updateEditQtyHint() {
  const itemId = Number(document.getElementById('edit-item').value);
  const selectedItem = items.find(it => it['id'] === itemId);
  const rec = records.find(r => r['id'] === currentEditId);
  const qty = parseInt(document.getElementById('edit-qty').value, 10);
  const hintEl = document.getElementById('edit-qty-hint');
  const btn = document.getElementById('save-btn');
  if (!hintEl || !selectedItem || !rec) return;

  // available = item's current remaining + this record's original qty (since we're editing it)
  const sameItem = selectedItem['名稱'] === rec['物資'] && selectedItem['短宣隊'] === rec['短宣隊'];
  const available = sameItem
    ? Number(selectedItem['剩餘數量']) + Number(rec['數量'])
    : Number(selectedItem['剩餘數量']);

  if (qty > available) {
    hintEl.innerHTML = `<div class="alert alert-error">數量不能超過可用數量（${available} 份）</div>`;
    if (btn) btn.disabled = true;
  } else {
    hintEl.innerHTML = '';
    if (btn) btn.disabled = false;
  }
}

function startEditRecord(id) {
  const rec = records.find(r => r['id'] === id);
  if (!rec) return;
  currentEditId = id;

  document.getElementById('edit-name').value = rec['姓名'];
  document.getElementById('edit-qty').value = rec['數量'];
  document.getElementById('edit-payment').value = rec['奉獻方式'];
  document.getElementById('edit-qty-hint').innerHTML = '';
  document.getElementById('edit-qty').oninput = updateEditQtyHint;
  document.getElementById('edit-item').onchange = updateEditQtyHint;
  const itemSel = document.getElementById('edit-item');
  const matchItem = items.find(it => it['名稱'] === rec['物資'] && it['短宣隊'] === rec['短宣隊']);
  if (matchItem) {
    itemSel.value = matchItem['id'];
  } else {
    document.getElementById('edit-msg').innerHTML =
      '<div class="alert alert-error">此認獻對應的物資已不存在，請重新選擇物資。</div>';
  }

  document.getElementById('edit-msg').innerHTML = '';
  document.getElementById('edit-target-label').innerHTML =
    `正在編輯：<strong>${escHtml(rec['姓名'])}</strong> — ${escHtml(rec['物資'])}（${escHtml(rec['短宣隊'])}）x${rec['數量']}`;

  // 高亮選中列
  document.querySelectorAll('#rec-list tr.editing').forEach(r => r.classList.remove('editing'));
  const row = document.getElementById(`rec-row-${id}`);
  if (row) row.classList.add('editing');

  const section = document.getElementById('rec-edit-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function updateEditItemRequiredHint() {
  const item = items.find(it => it['id'] === currentEditItemId);
  if (!item) return;
  const raised = Number(item['已募集']);
  const val = parseInt(document.getElementById('edit-item-required').value, 10);
  const hintEl = document.getElementById('edit-item-required-hint');
  const btn = document.getElementById('save-item-btn');
  if (!hintEl) return;
  if (val < raised) {
    hintEl.innerHTML = `<div class="alert alert-error">所需數量不能少於已募集數量（${raised} 份）</div>`;
    if (btn) btn.disabled = true;
  } else {
    hintEl.innerHTML = '';
    if (btn) btn.disabled = false;
  }
}

function startEditItem(id) {
  const item = items.find(it => it['id'] === id);
  if (!item) return;
  currentEditItemId = id;

  document.getElementById('edit-item-name').value = item['名稱'];
  document.getElementById('edit-item-team').value = item['短宣隊'];
  document.getElementById('edit-item-price').value = item['單價'];
  document.getElementById('edit-item-required').value = item['所需數量'];
  document.getElementById('edit-item-required-hint').innerHTML = '';
  document.getElementById('edit-item-required').oninput = updateEditItemRequiredHint;

  document.getElementById('item-edit-msg').innerHTML = '';
  document.getElementById('item-edit-target-label').innerHTML =
    `正在編輯：<strong>${escHtml(item['名稱'])}</strong>（${escHtml(item['短宣隊'])}）`;

  document.querySelectorAll('#mg-items tr.editing').forEach(r => r.classList.remove('editing'));
  const row = document.getElementById(`item-row-${id}`);
  if (row) row.classList.add('editing');

  const section = document.getElementById('item-edit-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function saveItem() {
  const btn = document.getElementById('save-item-btn');
  const msgEl = document.getElementById('item-edit-msg');
  msgEl.innerHTML = '';

  const id = currentEditItemId;
  if (!id) return;

  const 名稱 = document.getElementById('edit-item-name').value.trim();
  const 短宣隊 = document.getElementById('edit-item-team').value.trim();
  const 單價 = parseInt(document.getElementById('edit-item-price').value, 10);
  const 所需數量 = parseInt(document.getElementById('edit-item-required').value, 10);

  if (!名稱 || !短宣隊 || !單價 || 單價 <= 0 || !所需數量 || 所需數量 <= 0) {
    msgEl.innerHTML = '<div class="alert alert-error">請檢查名稱、短宣隊、單價或所需數量</div>'; return;
  }
  btn.disabled = true;
  try {
    await apiFetch(`/api/items/${id}`, 'PUT', { 名稱, 短宣隊, 單價, 所需數量 });
    currentEditItemId = null;
    document.getElementById('item-edit-section').style.display = 'none';
    await refresh();
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  } finally { btn.disabled = false; }
}

async function deleteItemById(id) {
  const msgEl = document.getElementById('del-msg');
  msgEl.innerHTML = '';
  if (!confirm('確定要刪除這個項目嗎？')) return;
  try {
    await apiFetch(`/api/items/${id}`, 'DELETE');
    msgEl.innerHTML = '<div class="alert alert-success">已刪除認獻項目</div>';
    await refresh();
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  }
}

// ── actions ───────────────────────────────────────────
async function addItem() {
  const btn = document.getElementById('add-btn');
  const msgEl = document.getElementById('add-msg');
  msgEl.innerHTML = '';
  const 名稱 = document.getElementById('add-name').value.trim();
  const 短宣隊 = document.getElementById('add-team').value.trim();
  const 單價 = parseInt(document.getElementById('add-price').value);
  const 所需數量 = parseInt(document.getElementById('add-required').value);

  if (!名稱 || !短宣隊 || !單價 || 單價 <= 0 || !所需數量 || 所需數量 <= 0) {
    msgEl.innerHTML = '<div class="alert alert-error">請檢查名稱、短宣隊、單價或所需數量</div>'; return;
  }
  btn.disabled = true;
  try {
    await apiFetch('/api/items', 'POST', { 名稱, 短宣隊, 單價, 所需數量 });
    msgEl.innerHTML = '<div class="alert alert-success">已新增認獻項目</div>';
    ['add-name','add-team'].forEach(id => document.getElementById(id).value = '');
    ['add-price'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-required').value = '1';
    await refresh();
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  } finally { btn.disabled = false; }
}

async function saveRecord() {
  const btn = document.getElementById('save-btn');
  const msgEl = document.getElementById('edit-msg');
  msgEl.innerHTML = '';

  const id = currentEditId;
  const rec = records.find(r => r['id'] === id);
  if (!rec) return;

  const 姓名 = document.getElementById('edit-name').value.trim();
  const itemId = Number(document.getElementById('edit-item').value);
  const selectedItem = items.find(it => it['id'] === itemId);
  const 數量 = parseInt(document.getElementById('edit-qty').value, 10);
  const 奉獻方式 = document.getElementById('edit-payment').value;

  if (!姓名 || !selectedItem || !數量 || 數量 <= 0) {
    msgEl.innerHTML = '<div class="alert alert-error">請檢查姓名、物資或數量</div>'; return;
  }
  const 物資 = selectedItem['名稱'], 短宣隊 = selectedItem['短宣隊'];

  btn.disabled = true;
  try {
    await apiFetch(`/api/records/${id}`, 'PUT', { 姓名, 物資, 短宣隊, 數量, 奉獻方式 });
    msgEl.innerHTML = '<div class="alert alert-success">已更新認獻紀錄</div>';
    currentEditId = null;
    document.getElementById('rec-edit-section').style.display = 'none';
    await refresh();
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  } finally { btn.disabled = false; }
}

async function deleteRecord() {
  const btn = document.getElementById('del-rec-btn');
  const msgEl = document.getElementById('edit-msg');
  msgEl.innerHTML = '';

  const id = currentEditId;
  const rec = records.find(r => r['id'] === id);
  if (!rec) return;
  if (!confirm('確定要刪除這筆認獻紀錄嗎？')) return;

  btn.disabled = true;
  try {
    await apiFetch(`/api/records/${id}`, 'DELETE');
    currentEditId = null;
    document.getElementById('rec-edit-section').style.display = 'none';
    msgEl.innerHTML = '<div class="alert alert-success">已刪除認獻紀錄</div>';
    await refresh();
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  } finally { btn.disabled = false; }
}

async function deleteRecordById(id) {
  if (!confirm('確定要刪除這筆認獻紀錄嗎？')) return;
  try {
    await apiFetch(`/api/records/${id}`, 'DELETE');
    if (currentEditId === id) {
      currentEditId = null;
      document.getElementById('rec-edit-section').style.display = 'none';
    }
    await refresh();
  } catch (e) {
    alert(e.message);
  }
}

let _resetTimer = null;

function openResetModal() {
  const btn = document.getElementById('reset-confirm-btn');
  const countdown = document.getElementById('reset-countdown');
  btn.disabled = true;
  document.getElementById('reset-modal').classList.add('active');

  let sec = 3;
  countdown.textContent = `請等待 ${sec} 秒...`;
  clearInterval(_resetTimer);
  _resetTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(_resetTimer);
      countdown.textContent = '';
      btn.disabled = false;
    } else {
      countdown.textContent = `確認前請稍候 ${sec} 秒...`;
    }
  }, 1000);
}

function closeResetModal() {
  clearInterval(_resetTimer);
  document.getElementById('reset-modal').classList.remove('active');
}

async function executeReset() {
  closeResetModal();
  try {
    await apiFetch('/api/reset', 'POST');
    await refresh();
  } catch (e) {
    alert(e.message);
  }
}

async function refresh() {
  [items, records] = await Promise.all([
    apiFetch('/api/items', 'GET'),
    apiFetch('/api/records', 'GET'),
  ]);
  renderAll();
}

(async () => {
  try {
    await refresh();
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="alert alert-error">載入失敗：${escHtml(e.message)}</div>`;
  }
})();
</script>
